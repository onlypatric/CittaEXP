name: Codebase Slimming

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  count-java-lines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate metrics snapshot
        run: |
          python3 scripts/quality/codebase_slimming.py metrics --repo-root .

      - name: Enforce slimming baseline
        run: |
          ./gradlew --no-daemon codebaseSlimmingCheck
