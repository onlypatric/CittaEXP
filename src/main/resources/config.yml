      start_here:
        title: "<gold><bold>Come iniziare</bold></gold>"
        subtitle: "Percorso base per usare la citta senza perderti tra i menu."
        when_to_use: "Usa questa pagina se hai appena creato o appena raggiunto una citta."
        requirements:
          - "Essere membro di una citta."
          - "Essere verificato su Discord se vuoi usare i comandi citta."
        steps:
          - "Usa /city per aprire la schermata principale della citta."
          - "Controlla i menu Membri, Territori, Banca, Livelli e Difesa."
          - "Se qualcosa non si apre, probabilmente ti manca il ruolo o il permesso giusto."
        result: "Sai da quale menu partire e dove trovare le funzioni principali."
        warnings:
          - "Se non sei verificato, /city e i suoi sotto-comandi restano bloccati."
        commands:
          - "/city - apre la schermata principale della tua citta"
          - "/verify - avvia la verifica Discord"
        buttons:
          - type: action
            target: hub
            label: "<green>Apri City Hub</green>"
          - type: page
            target: open_city_hub
            label: "<yellow>Capire la City Hub</yellow>"
          - type: page
            target: basic_commands
            label: "<yellow>Vedere i comandi utili</yellow>"
      open_city_hub:
        title: "<gold><bold>Come usare la City Hub</bold></gold>"
        subtitle: "La City Hub e il punto di accesso veloce a quasi tutto."
        when_to_use: "Aprila se vuoi capire quale tasto usare nella schermata /city."
        steps:
          - "Usa /city oppure clicca il comando che apre la HUB."
          - "Da qui puoi entrare in Membri, Territori, Banca, Livelli, Difesa e altre sezioni."
          - "Usa il tasto Help della HUB se vuoi tornare a questa wiki mentre stai gia giocando."
        result: "Sai quale menu aprire in base a quello che vuoi fare nella citta."
        commands:
          - "/city - apre direttamente la City Hub"
        buttons:
          - type: action
            target: hub
            label: "<green>Apri City Hub</green>"
          - type: page
            target: manage_members
            label: "<yellow>Gestire i membri</yellow>"
          - type: page
            target: claim_territory
            label: "<yellow>Gestire i territori</yellow>"
          - type: page
            target: use_bank
            label: "<yellow>Usare banca e vault</yellow>"
      invite_or_join:
        title: "<gold><bold>Come invitare o entrare in una citta</bold></gold>"
        subtitle: "Invitare qualcuno ed entrare in una citta sono due passaggi separati."
        when_to_use: "Aprila quando vuoi invitare qualcuno oppure entrare in una citta con un invito ricevuto."
        requirements:
          - "Essere nella tua citta per invitare qualcuno."
          - "Avere il ruolo o il permesso che permette gli inviti."
        steps:
          - "Per invitare, usa /city invite <player>."
          - "Chi riceve l'invito deve accettarlo per entrare davvero."
          - "Dopo l'ingresso, controlla la lista membri per verificare che sia dentro alla citta."
        result: "La persona invitata entra nella citta e compare subito tra i membri."
        warnings:
          - "Se chi vuoi invitare non e verificato o non puo usare i comandi citta, deve prima completare /verify."
        commands:
          - "/city invite <player> - invia un invito a un player"
        buttons:
          - type: page
            target: manage_members
            label: "<yellow>Gestire i membri dopo l'ingresso</yellow>"
          - type: page
            target: special_permissions
            label: "<yellow>Gestire i permessi speciali</yellow>"
      manage_members:
        title: "<gold><bold>Come gestire i membri</bold></gold>"
        subtitle: "Da qui capisci come vedere, promuovere e rimuovere i membri della citta."
        when_to_use: "Aprila quando vuoi cambiare ruolo, espellere un membro o controllare chi puo fare cosa."
        requirements:
          - "Essere nella citta."
          - "Essere capo per le azioni piu importanti come trasferire la citta o cambiare permessi speciali."
        steps:
          - "Apri /city e vai nella sezione Membri."
          - "Clicca il membro che vuoi gestire."
          - "Usa i tasti Promuovi, Abbassa grado, Rimuovi o Trasferisci citta se li vedi disponibili."
          - "Apri anche Permessi speciali se vuoi decidere cosa puo fare quel membro nei sistemi della citta."
        result: "Il membro avra il ruolo o i permessi aggiornati in base alla tua scelta."
        warnings:
          - "Se un tasto non compare o non funziona, il tuo ruolo non ti permette quell'azione."
          - "Trasferire la citta cambia il capo: fallo solo se sei sicuro."
        buttons:
          - type: page
            target: special_permissions
            label: "<yellow>Permessi speciali</yellow>"
          - type: action
            target: hub
            label: "<green>Torna alla City Hub</green>"
      special_permissions:
        title: "<gold><bold>Come funzionano i permessi speciali</bold></gold>"
        subtitle: "I permessi speciali decidono chi puo usare vault, negozi, difesa, invasioni e sfide."
        when_to_use: "Aprila quando vuoi permettere a un membro di usare una parte precisa della citta."
        requirements:
          - "Essere capo."
          - "Aprire la scheda di un membro dalla sezione Membri."
        steps:
          - "Apri la scheda del membro interessato."
          - "Entra in Permessi speciali."
          - "Apri il gruppo giusto, come Vault, Negozi, Difesa, Invasioni o Sfide."
          - "Scegli il permesso e premi Consenti oppure Blocca."
        result: "Quel membro potra usare solo le funzioni che hai lasciato attive."
        warnings:
          - "Questi permessi non sostituiscono il ruolo base del membro nella citta."
        buttons:
          - type: page
            target: manage_members
            label: "<yellow>Tornare alla gestione membri</yellow>"
          - type: page
            target: use_vault
            label: "<yellow>Capire il vault</yellow>"
          - type: page
            target: start_invasion
            label: "<yellow>Capire difesa e invasioni</yellow>"
      claim_territory:
        title: "<gold><bold>Come claimo un territorio</bold></gold>"
        subtitle: "Claimare un chunk lo aggiunge al territorio della tua citta."
        when_to_use: "Aprila quando vuoi espandere la tua citta."
        requirements:
          - "Avere il permesso di claimare."
          - "Avere ancora claim disponibili per il livello della tua citta."
          - "Il chunk deve essere adiacente ai claim della tua citta."
        steps:
          - "Apri /city e vai in Territori, oppure usa la wooden shovel sul chunk che vuoi claimare."
          - "Controlla che il chunk non sia gia claimato da qualcun altro."
          - "Claima il chunk dalla mappa oppure con click destro sul chunk adiacente."
        result: "Il chunk entra nel territorio della tua citta e conta nel totale claim usati."
        warnings:
          - "Se il chunk non e adiacente, non puo essere claimato."
          - "Se hai raggiunto il limite claim del tuo livello, devi prima far crescere la citta."
        commands:
          - "/city section - apre la mappa territori"
        buttons:
          - type: action
            target: territories
            label: "<green>Apri Territori</green>"
          - type: page
            target: view_claim_borders
            label: "<yellow>Vedere i bordi claim</yellow>"
          - type: page
            target: remove_claim
            label: "<yellow>Rimuovere un claim</yellow>"
          - type: page
            target: change_claim_type
            label: "<yellow>Cambiare il tipo del chunk</yellow>"
      remove_claim:
        title: "<gold><bold>Come rimuovo un claim</bold></gold>"
        subtitle: "Unclaimare un chunk lo toglie dal territorio della tua citta."
        when_to_use: "Aprila quando vuoi liberare un chunk o spostare il territorio."
        requirements:
          - "Avere il permesso di unclaim."
          - "Il chunk deve appartenere alla tua citta."
        steps:
          - "Apri Territori oppure usa la wooden shovel sul chunk gia claimato dalla tua citta."
          - "Se usi la shovel, conferma la rimozione nella dialog."
          - "Controlla che quel chunk non contenga elementi importanti come lo spawn della citta."
        result: "Il chunk torna wilderness e non fa piu parte del territorio della tua citta."
        warnings:
          - "Se il chunk contiene lo spawn della citta, potrebbe essere protetto."
          - "Non puoi rimuovere claim di altre citta."
        buttons:
          - type: action
            target: territories
            label: "<green>Apri Territori</green>"
          - type: page
            target: claim_territory
            label: "<yellow>Claimare un altro chunk</yellow>"
      view_claim_borders:
        title: "<gold><bold>Come vedere i bordi claim</bold></gold>"
        subtitle: "Puoi vedere i confini reali dei chunk claimati solo sul tuo client."
        when_to_use: "Aprila quando vuoi leggere bene i confini della tua citta o del chunk che stai guardando."
        steps:
          - "Dalla mappa Territori usa il tasto Visualizza bordi claim per vedere i confini della parte mostrata in quel momento."
          - "Se stai ispezionando il territorio nel mondo, tieni una blaze rod in mano e fai click destro per vedere il chunk attuale."
          - "Con la blaze rod, se il chunk appartiene a una citta, vedrai anche il confine esterno completo di quella citta."
        result: "Vedi i confini direttamente nel mondo, ma solo sul tuo client."
        warnings:
          - "I bordi della blaze rod spariscono quando smetti di tenerla in mano."
        buttons:
          - type: action
            target: territories
            label: "<green>Apri Territori</green>"
          - type: page
            target: claim_territory
            label: "<yellow>Claimare un territorio</yellow>"
      change_claim_type:
        title: "<gold><bold>Come cambio il tipo di un chunk</bold></gold>"
        subtitle: "Un chunk puo essere normale, farm oppure plot in base a come vuoi usarlo."
        when_to_use: "Aprila quando vuoi cambiare il comportamento di un chunk gia claimato dalla tua citta."
        requirements:
          - "Il chunk deve essere della tua citta."
          - "Devi avere il permesso per cambiare tipo claim."
        steps:
          - "Apri Territori."
          - "Clicca col tasto giusto sul chunk della tua citta per cambiare il tipo disponibile."
          - "Controlla il nuovo tipo prima di uscire dalla mappa."
        result: "Il chunk usa il nuovo tipo selezionato."
        warnings:
          - "Se non hai il permesso corretto, il tipo non cambia."
        buttons:
          - type: action
            target: territories
            label: "<green>Apri Territori</green>"
          - type: page
            target: claim_territory
            label: "<yellow>Tornare ai claim</yellow>"
      use_bank:
        title: "<gold><bold>Come usare la banca citta</bold></gold>"
        subtitle: "La banca della citta gestisce soldi, non item."
        when_to_use: "Aprila quando vuoi depositare soldi, prelevarli o controllare il saldo della citta."
        requirements:
          - "Avere il ruolo o il permesso corretto per usare la banca."
        steps:
          - "Apri /city e vai in Banca."
          - "Usa i tasti di deposito o prelievo in base a quello che devi fare."
          - "Controlla sempre saldo attuale e costo degli upgrade prima di spendere."
        result: "I soldi della citta vengono aggiornati e il saldo cambia subito."
        warnings:
          - "Banca e vault sono due sistemi diversi: uno gestisce soldi, l'altro item."
        commands:
          - "/city - apri la HUB e vai in Banca"
        buttons:
          - type: action
            target: bank
            label: "<green>Apri Banca</green>"
          - type: page
            target: use_vault
            label: "<yellow>Usare il vault</yellow>"
          - type: page
            target: level_up_city
            label: "<yellow>Usare i soldi per la crescita</yellow>"
      use_vault:
        title: "<gold><bold>Come usare il vault citta</bold></gold>"
        subtitle: "Il vault conserva materiali e item condivisi della citta."
        when_to_use: "Aprila quando vuoi depositare o prendere materiali dal vault della tua citta."
        requirements:
          - "Avere il permesso per aprire, depositare o prelevare dal vault."
        steps:
          - "Apri la banca della citta."
          - "Entra nella sezione vault."
          - "Deposita gli item richiesti oppure preleva quelli che ti servono, se il tuo permesso lo permette."
        result: "Gli item del vault vengono aggiornati subito per tutta la citta."
        warnings:
          - "Alcune quest richiedono di depositare materiali nel vault: controlla prima cosa serve."
        buttons:
          - type: action
            target: bank
            label: "<green>Apri Banca e Vault</green>"
          - type: page
            target: use_bank
            label: "<yellow>Tornare alla banca</yellow>"
      level_up_city:
        title: "<gold><bold>Come faccio salire la citta</bold></gold>"
        subtitle: "Per crescere servono XP citta, requisiti e a volte soldi o approvazioni."
        when_to_use: "Aprila quando vuoi capire cosa manca al prossimo livello o stage della citta."
        requirements:
          - "Controllare la sezione Livelli della citta."
          - "Avere abbastanza XP citta per il prossimo livello o il prossimo stage."
        steps:
          - "Apri /city e vai in Livelli."
          - "Leggi il livello attuale, l'XP accumulata e quanto manca al prossimo obiettivo."
          - "Se vedi un upgrade disponibile, controlla costo, banca, requisiti invasione e approvazione staff."
          - "Se sei il capo, conferma esplicitamente l'upgrade quando e disponibile."
        result: "La citta sale di livello o di stage e sblocca limiti e funzioni migliori."
        warnings:
          - "Alcuni stage richiedono anche approvazione staff o una certa invasione completata."
        buttons:
          - type: page
            target: start_invasion
            label: "<yellow>Capire il requisito invasione</yellow>"
          - type: page
            target: use_bank
            label: "<yellow>Capire il costo in banca</yellow>"
          - type: action
            target: hub
            label: "<green>Torna alla City Hub</green>"
      start_invasion:
        title: "<gold><bold>Come avvio un'invasione</bold></gold>"
        subtitle: "Le invasioni fanno avanzare la citta e danno reward, ma richiedono preparazione."
        when_to_use: "Aprila quando vuoi avviare una mob invasion o capire perche non puoi farlo."
        requirements:
          - "Avere accesso alla difesa della citta."
          - "Avere i requisiti del tier che vuoi iniziare."
          - "Avere il costo richiesto, se previsto."
        steps:
          - "Apri /city e vai in Difesa."
          - "Scegli il tier invasione che vuoi fare."
          - "Leggi requisiti, reward e stato del tier."
          - "Conferma l'avvio se il tier e disponibile."
        result: "Parte l'invasione del tier scelto e la tua citta deve difendersi dalle ondate."
        warnings:
          - "Se il tier e bloccato, controlla livello citta, reward precedenti e requisiti richiesti."
          - "Le prime vittorie possono dare reward uniche solo una volta."
        buttons:
          - type: action
            target: defense
            label: "<green>Apri Difesa</green>"
          - type: page
            target: read_invasion_rewards
            label: "<yellow>Capire le ricompense</yellow>"
          - type: page
            target: level_up_city
            label: "<yellow>Capire il legame coi livelli</yellow>"
      read_invasion_rewards:
        title: "<gold><bold>Come leggere le ricompense delle invasioni</bold></gold>"
        subtitle: "Ogni tier mostra reward normali e, in alcuni casi, reward uniche di prima vittoria."
        when_to_use: "Aprila quando vuoi capire cosa ottiene davvero la citta da un tier invasione."
        steps:
          - "Apri la schermata Difesa."
          - "Scorri i tier e leggi durata, reward base e reward di prima vittoria."
          - "Controlla bene materiali, soldi, XP e item unici mostrati nella lore del tier."
        result: "Sai cosa conviene fare prima e quale tier vale di piu per la tua citta."
        warnings:
          - "Le reward di prima vittoria non vengono ripetute ai clear successivi."
        buttons:
          - type: action
            target: defense
            label: "<green>Apri Difesa</green>"
          - type: page
            target: start_invasion
            label: "<yellow>Tornare all'avvio invasione</yellow>"
      link_discord:
        title: "<gold><bold>Come collego Discord</bold></gold>"
        subtitle: "Il collegamento Discord serve per usare i comandi citta e le funzioni collegate all'account."
        when_to_use: "Aprila quando /city ti manda a verificarti o vuoi controllare il link Discord."
        requirements:
          - "Essere nel Discord corretto del server."
        steps:
          - "Usa /verify."
          - "Conferma di essere nel server Discord corretto."
          - "Segui i passaggi mostrati dal dialog fino alla fine."
          - "Se scegli No nel primo dialog, ti viene aperto /discord per raggiungere il server giusto."
        result: "L'account Minecraft viene collegato e puoi usare le funzioni citta che richiedono verifica."
        warnings:
          - "Se non completi il collegamento, /city e i sotto-comandi restano bloccati."
        commands:
          - "/verify - avvia o riprende il collegamento Discord"
          - "/discord - apre il percorso per raggiungere il server Discord"
        buttons:
          - type: page
            target: start_here
            label: "<yellow>Tornare a come iniziare</yellow>"
          - type: page
            target: basic_commands
            label: "<yellow>Comandi utili</yellow>"
      basic_commands:
        title: "<gold><bold>Comandi utili di /city</bold></gold>"
        subtitle: "Questi sono i comandi piu utili per orientarti rapidamente."
        when_to_use: "Usa questa pagina quando vuoi ricordarti i comandi base o spostarti piu in fretta."
        commands:
          - "/city - apre la schermata principale della tua citta"
          - "/city list - apre la lista delle citta"
          - "/city section - apre la mappa territori"
          - "/city invite <player> - invita un player nella tua citta"
          - "/city trust <player> <preset> - assegna trust sul chunk attuale"
          - "/city untrust <player> - rimuove trust dal chunk attuale"
          - "/city warp [citta] - ti teletrasporta al warp della tua citta o di un'altra"
          - "/city setwarp - imposta il warp della tua citta nel claim in cui ti trovi"
          - "/city chat [messaggio] - usa la chat della citta"
          - "/verify - avvia la verifica Discord"
        result: "Hai sotto mano i comandi piu usati per entrare nei menu giusti."
        buttons:
          - type: page
            target: start_here
            label: "<yellow>Come iniziare</yellow>"
          - type: page
            target: claim_territory
            label: "<yellow>Claimare un territorio</yellow>"
          - type: page
            target: link_discord
            label: "<yellow>Collegare Discord</yellow>"
          - type: page
            target: other_tools
            label: "<yellow>Altre funzioni</yellow>"
      manage_relations:
        title: "<gold><bold>Come gestisco le relazioni tra citta</bold></gold>"
        subtitle: "Le relazioni servono per tenere sotto controllo alleanze, neutralita e altri rapporti tra citta."
        when_to_use: "Aprila quando vuoi capire dove si cambiano o si leggono le relazioni."
        requirements:
          - "Avere il ruolo o il permesso che permette di gestire la diplomazia."
        steps:
          - "Apri /city e vai nella sezione delle relazioni o della diplomazia."
          - "Controlla lo stato attuale con le altre citta."
          - "Se puoi modificarlo, scegli la relazione che vuoi impostare."
        result: "La tua citta vede e, se autorizzata, aggiorna le relazioni con le altre citta."
        warnings:
          - "Non tutti i ruoli possono cambiare le relazioni."
        buttons:
          - type: action
            target: hub
            label: "<green>Torna alla City Hub</green>"
          - type: page
            target: basic_commands
            label: "<yellow>Comandi utili</yellow>"
          - type: page
            target: start_war
            label: "<yellow>Capire la guerra</yellow>"
      other_tools:
        title: "<gold><bold>Altre funzioni utili</bold></gold>"
        subtitle: "Qui trovi le funzioni utili che non compaiono nella schermata iniziale."
        when_to_use: "Usa questa pagina quando cerchi funzioni avanzate o meno frequenti della citta."
        steps:
          - "Scegli il task che ti serve dai tasti qui sotto."
          - "Apri la pagina pratica dedicata."
          - "Segui il flow spiegato nella pagina scelta."
        result: "Raggiungi rapidamente anche le funzioni meno ovvie della tua citta."
        buttons:
          - type: page
            target: create_city
            label: "<yellow>Creare una citta</yellow>"
          - type: page
            target: browse_cities
            label: "<yellow>Lista citta</yellow>"
          - type: page
            target: use_warp
            label: "<yellow>Usare il warp</yellow>"
          - type: page
            target: set_city_warp
            label: "<yellow>Impostare il warp</yellow>"
          - type: page
            target: use_chunk_trust
            label: "<yellow>Trust per chunk</yellow>"
          - type: page
            target: city_chat
            label: "<yellow>Chat citta</yellow>"
          - type: page
            target: use_city_shop
            label: "<yellow>Negozi citta</yellow>"
          - type: page
            target: manage_relations
            label: "<yellow>Relazioni tra citta</yellow>"
          - type: page
            target: start_war
            label: "<yellow>Guerra tra citta</yellow>"
      create_city:
        title: "<gold><bold>Come creo una citta</bold></gold>"
        subtitle: "La creazione della citta parte da un dialog guidato."
        when_to_use: "Aprila quando vuoi fondare una nuova citta."
        requirements:
          - "Essere verificato su Discord."
          - "Avere i requisiti economici richiesti dalla creazione."
        steps:
          - "Usa /city create."
          - "Segui il dialog e inserisci il nome della citta quando viene richiesto."
          - "Conferma i passaggi finali del flow di creazione."
        result: "La tua nuova citta viene creata e puoi iniziare a gestirla da /city."
        warnings:
          - "Se non sei verificato, il flow di creazione non parte."
        commands:
          - "/city create - avvia la creazione della citta"
        buttons:
          - type: page
            target: start_here
            label: "<yellow>Come iniziare dopo la creazione</yellow>"
          - type: page
            target: claim_territory
            label: "<yellow>Claimare il primo territorio</yellow>"
      browse_cities:
        title: "<gold><bold>Come uso la lista citta</bold></gold>"
        subtitle: "La lista citta serve per vedere chi esiste sul server e aprire le schede utili."
        when_to_use: "Aprila quando vuoi sfogliare le citta presenti o cercarne una in particolare."
        steps:
          - "Usa /city list."
          - "Scorri la lista e apri la citta che ti interessa."
          - "Da li puoi controllare nome, stato e altre informazioni disponibili."
        result: "Trovi rapidamente la citta che vuoi controllare."
        commands:
          - "/city list - apre la lista delle citta"
        buttons:
          - type: page
            target: use_warp
            label: "<yellow>Usare il warp di una citta</yellow>"
          - type: page
            target: manage_relations
            label: "<yellow>Capire le relazioni</yellow>"
      use_warp:
        title: "<gold><bold>Come uso il warp citta</bold></gold>"
        subtitle: "Il warp ti porta allo spawn della tua citta oppure di una citta specifica."
        when_to_use: "Aprila quando vuoi teletrasportarti alla tua citta o a una citta che conosci."
        steps:
          - "Usa /city warp per andare al warp della tua citta."
          - "Usa /city warp <nome_citta> se vuoi raggiungere il warp di una citta precisa."
          - "Se il teleport fallisce, controlla che la citta esista e abbia uno spawn valido."
        result: "Vieni teletrasportato al warp della citta scelta."
        commands:
          - "/city warp - warp della tua citta"
          - "/city warp <nome_citta> - warp della citta indicata"
        buttons:
          - type: page
            target: set_city_warp
            label: "<yellow>Impostare il warp della tua citta</yellow>"
          - type: page
            target: browse_cities
            label: "<yellow>Trovare una citta dalla lista</yellow>"
      set_city_warp:
        title: "<gold><bold>Come imposto il warp della citta</bold></gold>"
        subtitle: "Il warp si imposta stando dentro un claim della propria citta."
        when_to_use: "Aprila quando vuoi cambiare lo spawn ufficiale della tua citta."
        requirements:
          - "Avere il permesso per impostare lo spawn della citta."
          - "Stare dentro un claim della tua citta."
        steps:
          - "Raggiungi il punto esatto in cui vuoi mettere il warp."
          - "Assicurati di essere dentro un claim della tua citta."
          - "Usa /city setwarp."
        result: "Il warp della tua citta viene aggiornato con la nuova posizione."
        warnings:
          - "Se sei fuori dai claim della tua citta, il comando viene rifiutato."
        commands:
          - "/city setwarp - imposta lo spawn della tua citta"
        buttons:
          - type: page
            target: use_warp
            label: "<yellow>Usare il warp</yellow>"
          - type: page
            target: claim_territory
            label: "<yellow>Claimare il punto giusto prima di impostarlo</yellow>"
      use_chunk_trust:
        title: "<gold><bold>Come funziona il trust per chunk</bold></gold>"
        subtitle: "Il trust per chunk permette al capo di dare accessi speciali solo su un chunk preciso."
        when_to_use: "Aprila quando vuoi dare accesso a un chunk senza cambiare tutto il ruolo di una persona."
        requirements:
          - "Essere capo."
          - "Stare nel chunk della tua citta su cui vuoi impostare il trust."
        steps:
          - "Vai nel chunk interessato."
          - "Usa /city trust <player> <access|build|full>."
          - "Conferma il dialog."
          - "Usa /city trust list per controllare i trust attivi sul chunk attuale."
          - "Usa /city untrust <player> per rimuovere il trust."
        result: "La persona scelta ottiene solo i permessi del preset su quel chunk."
        warnings:
          - "Il trust vale sul chunk in cui ti trovi quando lanci il comando."
          - "Solo il capo puo modificare questi trust."
        commands:
          - "/city trust <player> <access|build|full> - assegna trust sul chunk attuale"
          - "/city trust list - mostra i trust del chunk attuale"
          - "/city untrust <player> - rimuove il trust dal chunk attuale"
        buttons:
          - type: page
            target: claim_territory
            label: "<yellow>Capire meglio i chunk della citta</yellow>"
          - type: page
            target: manage_members
            label: "<yellow>Gestire ruoli e membri</yellow>"
      city_chat:
        title: "<gold><bold>Come uso la chat della citta</bold></gold>"
        subtitle: "La chat citta serve per parlare solo con i membri della tua citta."
        when_to_use: "Aprila quando vuoi mandare un messaggio visibile solo ai membri della tua citta."
        requirements:
          - "Essere nella citta."
          - "Avere il permesso per usare la chat della citta."
        steps:
          - "Usa /city chat <messaggio> per inviare subito un messaggio alla citta."
          - "Se usi /city chat senza testo, il sistema usa il flow previsto dal comando per la chat cittadina."
        result: "Il messaggio viene inviato solo ai membri della tua citta."
        commands:
          - "/city chat <messaggio> - invia un messaggio alla chat della citta"
        buttons:
          - type: page
            target: manage_members
            label: "<yellow>Gestire chi puo usare la chat</yellow>"
          - type: page
            target: basic_commands
            label: "<yellow>Altri comandi utili</yellow>"
      use_city_shop:
        title: "<gold><bold>Come creo e uso un negozio citta</bold></gold>"
        subtitle: "I negozi citta usano cartello e cassa dentro un claim della tua citta."
        when_to_use: "Aprila quando vuoi creare un emporio cittadino o usarne uno gia esistente."
        requirements:
          - "Avere il permesso per creare negozi cittadini."
          - "Essere in un claim della tua citta."
          - "Avere un solo container adiacente al cartello."
        steps:
          - "Piazza un cartello vicino a una sola chest o trapped chest."
          - "Nella prima riga metti il prezzo, per esempio B10K, S8 oppure B10K : S8."
          - "Nella seconda riga metti il nome esatto della tua citta."
          - "Lascia la terza riga libera."
          - "Nella quarta riga scrivi la quantita, per esempio Q:16."
          - "Per configurare l'item del negozio, interagisci come previsto dal tuo ruolo con l'item corretto in mano."
        result: "Il cartello diventa un negozio cittadino valido e puo comprare o vendere in base al setup."
        warnings:
          - "Il cartello e la cassa devono stare entrambi dentro claim della tua citta."
          - "Se il cartello tocca piu casse, il negozio non viene creato."
        buttons:
          - type: page
            target: use_bank
            label: "<yellow>Capire la banca della citta</yellow>"
          - type: page
            target: use_vault
            label: "<yellow>Capire il vault della citta</yellow>"
      start_war:
        title: "<gold><bold>Come funziona la guerra tra citta</bold></gold>"
        subtitle: "La guerra richiede relazioni attive, requisiti minimi e fondi disponibili."
        when_to_use: "Aprila quando vuoi dichiarare guerra o capire perche una guerra non parte."
        requirements:
          - "Avere il permesso per dichiarare guerra."
          - "Avere spawn valido nella tua citta."
          - "Avere abbastanza soldi per la posta minima."
          - "Essere nel range di livelli consentito rispetto alla citta bersaglio."
        steps:
          - "Apri la sezione guerra o relazioni dalla HUB della citta."
          - "Scegli una citta bersaglio valida."
          - "Controlla posta minima, relazioni, cooldown e spawn richiesti."
          - "Invia la dichiarazione di guerra se il target risulta pronto."
          - "Quando la guerra e attiva, controlla lo stato live e i reward previsti."
        result: "La guerra viene dichiarata oppure sai esattamente quale requisito ti blocca."
        warnings:
          - "Una citta gia in guerra o in cooldown non puo entrare subito in una nuova guerra."
          - "Se rompi un'alleanza per dichiarare guerra, controlla bene il warning prima di confermare."
        buttons:
          - type: page
            target: manage_relations
            label: "<yellow>Controllare le relazioni prima della guerra</yellow>"
          - type: page
            target: use_bank
            label: "<yellow>Controllare i fondi della citta</yellow>"
