name: CittaEXP
version: ${version}
main: it.patric.cittaexp.CittaExpPlugin
api-version: '1.21'
authors: [Patric]
description: Bootstrap minimale CittaEXP basato su HuskTowns.
depend: [HuskTowns]
softdepend: [HuskClaims]
permissions:
  cittaexp.city.use:
    description: Accesso ai comandi /city
    default: true
  cittaexp.staff.level:
    description: Accesso staff a /cittaexp staff level ...
    default: op
  cittaexp.town.level.bypass:
    description: Bypass tecnico per usare /town level
    default: op
  cittaexp.city.players.staff:
    description: Accesso staff a /cittaexp staff city players <citta>
    default: op
  cittaexp.admin.probe:
    description: Accesso a /cittaexp probe
    default: op
