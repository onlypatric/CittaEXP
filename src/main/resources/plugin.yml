name: CittaEXP
version: ${version}
main: it.patric.cittaexp.CittaExpPlugin
api-version: '1.21'
authors: [Patric]
description: GUI-first city plugin preview framework for Paper.
softdepend: [ItemsAdder]
commands:
  cittaexp:
    description: GUI preview and scenario controls for CittaEXP
    usage: /cittaexp <dashboard|members|roles|taxes|wizard|scenario|theme|hud|probe>
permissions:
  cittaexp.admin.gui.preview:
    description: Allows opening GUI previews and controlling scenarios/themes
    default: op
