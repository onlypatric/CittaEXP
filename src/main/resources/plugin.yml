name: CittaEXP
version: ${version}
main: it.patric.cittaexp.CittaExpPlugin
api-version: '1.21'
authors: [Patric]
description: Framework plugin city-first con GUI di anteprima per Paper.
softdepend: [ItemsAdder]
depend: [Vault, HuskClaims, ClassificheEXP]
commands:
  cittaexp:
    description: Comandi anteprima GUI e diagnostica di CittaEXP
    usage: /cittaexp <dashboard|members|roles|taxes|wizard|scenario|theme|hud|probe|dialog>
permissions:
  cittaexp.admin.gui.preview:
    description: Allows opening GUI previews and controlling scenarios/themes
    default: op
